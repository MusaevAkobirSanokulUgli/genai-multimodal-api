version: "3.9"

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: genai-api
    ports:
      - "8000:8000"
    environment:
      - GENAI_OPENAI_API_KEY=${GENAI_OPENAI_API_KEY:-}
      - GENAI_DEBUG=false
      - GENAI_MODERATION_ENABLED=true
    env_file:
      - ./backend/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: genai-web
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

networks:
  default:
    name: genai-network
